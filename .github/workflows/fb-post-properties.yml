name: 每日FB物件自動發文（早上8點 + 下午2點）

on:
  schedule:
    - cron: '0 0 * * *'   # 台灣時間 08:00（UTC 00:00）
    - cron: '0 6 * * *'   # 台灣時間 14:00（UTC 06:00）
  workflow_dispatch:
    inputs:
      slot:
        description: '時段（morning / afternoon）'
        required: false
        default: 'morning'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests

      - name: 判斷時段（早 or 晚）
        id: slot
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 3 ]; then
            echo "offset=0" >> $GITHUB_OUTPUT
          else
            echo "offset=1" >> $GITHUB_OUTPUT
          fi

      - name: 發布今日物件到 Facebook
        run: python scripts/fb_post_properties.py
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          POST_OFFSET: ${{ steps.slot.outputs.offset }}
