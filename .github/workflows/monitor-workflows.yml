name: 監控每日 Workflows（自動補跑）

on:
  schedule:
    - cron: '0 1 * * *'    # 09:00 TW → 檢查 fb-post-properties（早場08:00）
    - cron: '30 1 * * *'   # 09:30 TW → 檢查 fb-post-news（08:30）
    - cron: '0 2 * * *'    # 10:00 TW → 檢查 sync-properties + fb-post-news-video（09:00）
    - cron: '30 2 * * *'   # 10:30 TW → 檢查 daily-blog-post（09:30）
    - cron: '0 7 * * *'    # 15:00 TW → 檢查 fb-post-properties（午場14:00）
    - cron: '0 8 * * *'    # 16:00 TW → 檢查 fb-post-news-video（下午場15:00）
    - cron: '0 9 * * *'    # 17:00 TW → 檢查 fb-post-properties（晚場16:00）
  workflow_dispatch:        # 可手動觸發

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: 確認並補跑未執行的 Workflows
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          # 取「2小時前」時間點，用來判斷該時段內是否有成功執行
          SINCE=$(date -u -d "2 hours ago" --iso-8601=seconds)

          check_workflow() {
            local WF=$1
            echo "=============================="
            echo "🔍 檢查 workflow: $WF"
            echo "   時間窗口: $SINCE 之後"

            SUCCESS=$(gh run list \
              --workflow="$WF" \
              --repo="$REPO" \
              --limit=20 \
              --json conclusion,createdAt \
              --jq "[.[] | select(.createdAt >= \"$SINCE\" and .conclusion==\"success\")] | length")

            if [ "$SUCCESS" -gt 0 ]; then
              echo "✅ $WF：近2小時內已成功執行（${SUCCESS} 筆）"
            else
              # 也檢查是否有 in_progress（避免重複觸發）
              IN_PROGRESS=$(gh run list \
                --workflow="$WF" \
                --repo="$REPO" \
                --limit=5 \
                --json status,createdAt \
                --jq "[.[] | select(.createdAt >= \"$SINCE\" and .status==\"in_progress\")] | length")

              if [ "$IN_PROGRESS" -gt 0 ]; then
                echo "⏳ $WF：正在執行中，跳過補跑"
              else
                echo "⚠️  $WF：近2小時未成功執行，補觸發中..."
                if gh workflow run "$WF" --repo="$REPO"; then
                  echo "✅ 補觸發成功"
                else
                  echo "❌ 補觸發失敗"
                fi
              fi
            fi
          }

          echo "當前 UTC 時間：${HOUR}:${MIN}"
          echo ""

          # 根據當前 UTC 時間決定要檢查哪些 workflow
          if   [ "$HOUR" = "01" ] && [ "$MIN" -lt 20 ]; then
            echo "📌 時段：09:00 TW → 檢查早場物件貼文"
            check_workflow "fb-post-properties.yml"

          elif [ "$HOUR" = "01" ] && [ "$MIN" -ge 30 ]; then
            echo "📌 時段：09:30 TW → 檢查新聞文字貼文"
            check_workflow "fb-post-news.yml"

          elif [ "$HOUR" = "02" ] && [ "$MIN" -lt 20 ]; then
            echo "📌 時段：10:00 TW → 檢查物件同步 + 新聞影片（早）"
            check_workflow "sync-properties.yml"
            check_workflow "fb-post-news-video.yml"

          elif [ "$HOUR" = "02" ] && [ "$MIN" -ge 30 ]; then
            echo "📌 時段：10:30 TW → 檢查自動產房市文章"
            check_workflow "daily-blog-post.yml"

          elif [ "$HOUR" = "07" ]; then
            echo "📌 時段：15:00 TW → 檢查午場物件貼文"
            check_workflow "fb-post-properties.yml"

          elif [ "$HOUR" = "08" ]; then
            echo "📌 時段：16:00 TW → 檢查新聞影片（下午）"
            check_workflow "fb-post-news-video.yml"

          elif [ "$HOUR" = "09" ]; then
            echo "📌 時段：17:00 TW → 檢查晚場物件貼文"
            check_workflow "fb-post-properties.yml"

          else
            echo "⚠️  未知時段（UTC ${HOUR}:${MIN}），跳過"
          fi
