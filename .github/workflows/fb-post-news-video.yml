name: 每日FB新聞語音影片（早上9:00）

on:
  schedule:
    - cron: '0 1 * * *'   # 台灣時間 09:00（UTC 01:00）
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests edge-tts imageio-ffmpeg

      - name: 安裝 ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: 產生語音影片並發布到 Facebook
        run: python scripts/fb_post_news_video.py
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
