name: 每日FB新聞文字發文（早上8:30）

on:
  schedule:
    - cron: '30 0 * * *'   # 台灣時間 08:30（UTC 00:30）
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests

      - name: 發布今日新聞文字貼文到 Facebook
        run: python scripts/fb_post_news.py
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
